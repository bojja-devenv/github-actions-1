name: learn-github-actions
run-name: ${{ github.actor }} is learning GitHub Actions
on: [push]
jobs:
  job_id:
    permissions:
      contents: 'read'
      id-token: 'write'

    - id: 'auth'
      uses: 'google-github-actions/auth@v3'
      with:
        project_id: 'dialogflowcx-handson'
        workload_identity_provider: 'projects/692897809117/locations/global/workloadIdentityPools/my-pool/providers/my-provider'